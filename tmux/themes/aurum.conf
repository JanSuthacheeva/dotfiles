# aurum tmux palette (slate + gold). Written to ~/.config/tmux/theme.conf by
# macos/theme, then sourced by tmux.conf before catppuccin loads (catppuccin
# uses `set -ogq`, so these `set -g` values win).

set -g @thm_bg        "#262b33"
set -g @thm_fg        "#d4d8e2"
set -g @thm_mantle    "#2e333c"
set -g @thm_crust     "#2e333c"
set -g @thm_surface_0 "#2e333c"
set -g @thm_surface_1 "#938b78"
set -g @thm_surface_2 "#938b78"
set -g @thm_overlay_0 "#938b78"
set -g @thm_overlay_1 "#938b78"
set -g @thm_overlay_2 "#938b78"
set -g @thm_subtext_0 "#d4d8e2"
set -g @thm_subtext_1 "#d4d8e2"
set -g @thm_yellow    "#d8ab2e"
set -g @thm_peach     "#cf6a48"
set -g @thm_red       "#cf6a48"
set -g @thm_maroon    "#cf6a48"
set -g @thm_green     "#a6b262"
set -g @thm_teal      "#88b0a2"
set -g @thm_sky       "#88b0a2"
set -g @thm_sapphire  "#88b0a2"
set -g @thm_blue      "#849ec2"
set -g @thm_lavender  "#849ec2"
set -g @thm_mauve     "#b894c2"
set -g @thm_pink      "#b894c2"
set -g @thm_flamingo  "#ecd693"
set -g @thm_rosewater "#ecd693"

# Transparent bar; window pills made transparency-safe in tmux.conf (see spectra.conf).
set -g @catppuccin_status_background "none"
set -g status-style "bg=default,fg=#d4d8e2"

set -g pane-active-border-style "fg=#ecd693,bg=default"
set -g pane-border-style "fg=#938b78,bg=default"
