# spectra tmux palette (Omarchy Spectra). Written to ~/.config/tmux/theme.conf
# by macos/theme, then sourced by tmux.conf before catppuccin loads. Accent is
# blue (spectra has no gold).

set -g @thm_bg        "#1a1b1e"
set -g @thm_fg        "#eaeaef"
set -g @thm_mantle    "#2b2d31"
set -g @thm_crust     "#2b2d31"
set -g @thm_surface_0 "#2b2d31"
set -g @thm_surface_1 "#505258"
set -g @thm_surface_2 "#505258"
set -g @thm_overlay_0 "#505258"
set -g @thm_overlay_1 "#505258"
set -g @thm_overlay_2 "#505258"
set -g @thm_subtext_0 "#eaeaef"
set -g @thm_subtext_1 "#eaeaef"
set -g @thm_yellow    "#f7c553"
set -g @thm_peach     "#ef5d67"
set -g @thm_red       "#ef5d67"
set -g @thm_maroon    "#ef5d67"
set -g @thm_green     "#8edb73"
set -g @thm_teal      "#7dd8d3"
set -g @thm_sky       "#7dd8d3"
set -g @thm_sapphire  "#7dd8d3"
set -g @thm_blue      "#7ca5ff"
set -g @thm_lavender  "#7ca5ff"
set -g @thm_mauve     "#e29ef3"
set -g @thm_pink      "#e29ef3"
set -g @thm_flamingo  "#7ca5ff"
set -g @thm_rosewater "#7ca5ff"

# Transparent bar (wallpaper shows through). Window pills are made transparency-
# safe in tmux.conf (rounded caps drawn in the pill color, not the reverse trick),
# so "none" is fine here.
set -g @catppuccin_status_background "none"
set -g status-style "bg=default,fg=#eaeaef"

set -g pane-active-border-style "fg=#7ca5ff,bg=default"
set -g pane-border-style "fg=#505258,bg=default"
