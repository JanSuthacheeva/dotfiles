##--------------------------------------------------------------------------
## Claude
##--------------------------------------------------------------------------

set -g allow-passthrough on
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'

##--------------------------------------------------------------------------
## Keybinding
##--------------------------------------------------------------------------

unbind-key C-b
set-option -g prefix C-a

# Sessionizer: prefix + f -> fzf-pick a project, create/switch its session (scripts/t)
bind-key -r f run-shell "tmux neww t"

##--------------------------------------------------------------------------
## Plugins
##--------------------------------------------------------------------------

set -g @plugin 'catppuccin/tmux'
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-battery'

# Configure the catppuccin plugin
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"

# Load catppuccin
# run ~/.tmux/plugins/tmux/catppuccin.tmux

# Make the status line pretty and add some modules
set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
# NOTE: status-right is assembled AFTER `run tpm` (below) — the
# @catppuccin_status_* module vars don't exist until the plugin loads,
# so building it here left battery empty until a manual source-file.
set -g @catppuccin_date_time_text " %H:%M"
set -g @catppuccin_status_background "#262b33"
set -g @catppuccin_window_left_separator ""
set -g @catppuccin_window_right_separator " "
set -g @catppuccin_window_middle_separator " █"
set -g @catppuccin_window_number_position "right"
set -g @catppuccin_window_default_fill "number"
set -g @catppuccin_window_text " #W"
set -g @catppuccin_window_current_fill "number"
set -g @catppuccin_window_current_text " #W#{?window_zoomed_flag,(),}"
set -g @catppuccin_status_modules_right "directory date_time"
set -g @catppuccin_status_modules_left "session"
set -g @catppuccin_status_left_separator  " "
set -g @catppuccin_status_right_separator " "
set -g @catppuccin_status_right_separator_inverse "no"
set -g @catppuccin_status_fill "icon"
set -g @catppuccin_status_connect_separator "no"
set -g @catppuccin_directory_text "#{b:pane_current_path}"

##--------------------------------------------------------------------------
## aurum theme (TEMPORARY: recolors catppuccin — replace with own status line)
##--------------------------------------------------------------------------
# catppuccin sets its palette with `set -ogq` (only-if-unset), so setting
# @thm_* / @catppuccin_*_color here (before tpm runs) overrides it.
# Values = aurum-slate flavor. See .local/plans/colortheme/palette.md

# Palette -> aurum hues
set -g @thm_bg       "#262b33"
set -g @thm_fg       "#d4d8e2"
set -g @thm_mantle   "#1f242b"
set -g @thm_crust    "#1a1e24"
set -g @thm_surface_0 "#2e333c"
set -g @thm_surface_1 "#383f49"
set -g @thm_surface_2 "#434b57"
set -g @thm_overlay_0 "#5a5f6a"
set -g @thm_overlay_1 "#6e7480"
set -g @thm_overlay_2 "#938b78"
set -g @thm_subtext_0 "#b8bcc4"
set -g @thm_subtext_1 "#c6cad2"
set -g @thm_yellow    "#d8ab2e"
set -g @thm_peach     "#cf6a48"
set -g @thm_red       "#cf6a48"
set -g @thm_maroon    "#cf6a48"
set -g @thm_green     "#a6b262"
set -g @thm_teal      "#88b0a2"
set -g @thm_sky       "#88b0a2"
set -g @thm_sapphire  "#88b0a2"
set -g @thm_blue      "#849ec2"
set -g @thm_lavender  "#849ec2"
set -g @thm_mauve     "#b894c2"
set -g @thm_pink      "#b894c2"
set -g @thm_flamingo  "#ecd693"
set -g @thm_rosewater "#ecd693"

# Module colors -> gold-forward (filled segments use bright gold-pale so the
# block reads as gold, not dark mustard; #d8ab2e looks dark as a fill bg)
set -g @catppuccin_session_color   "#{?client_prefix,#{E:@thm_peach},#{E:@thm_flamingo}}"
set -g @catppuccin_directory_color "#{E:@thm_blue}"
set -g @catppuccin_date_time_color "#{E:@thm_flamingo}"
set -g @catppuccin_battery_color   "#{E:@thm_teal}"

# Active window -> bright gold (default is @thm_mauve)
set -g @catppuccin_window_current_number_color "#{E:@thm_flamingo}"

##--------------------------------------------------------------------------
## Status line assembly + plugin load order
##--------------------------------------------------------------------------
# Load catppuccin NOW so its @catppuccin_status_* module vars exist, then bake
# status-right (with the literal #{battery_*} placeholders) BEFORE tpm loads
# tmux-battery — that plugin substitutes those placeholders at load time, so
# they must already be present. Building status-right after tpm left battery
# empty until a manual source-file.
run '~/.config/tmux/plugins/tmux/catppuccin.tmux'

set -g  status-right "#{E:@catppuccin_status_application}"
set -ag status-right "#{E:@catppuccin_status_session}"
set -agF status-right "#{E:@catppuccin_status_battery}"
set -agF status-right "#{E:@catppuccin_status_date_time}"

run '~/.tmux/plugins/tpm/tpm'
