##--------------------------------------------------------------------------
## Claude
##--------------------------------------------------------------------------

set -g allow-passthrough on
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'

##--------------------------------------------------------------------------
## Keybinding
##--------------------------------------------------------------------------

unbind-key C-b
set-option -g prefix C-a

# Sessionizer: prefix + f -> fzf-pick a project, create/switch its session (scripts/t)
bind-key -r f run-shell "tmux neww t"

##--------------------------------------------------------------------------
## Plugins
##--------------------------------------------------------------------------

set -g @plugin 'catppuccin/tmux'
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-battery'

# Configure the catppuccin plugin
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "rounded"

# Load catppuccin
# run ~/.tmux/plugins/tmux/catppuccin.tmux

# Make the status line pretty and add some modules
set -g status-right-length 100
set -g status-left-length 100
set -g status-left ""
# NOTE: status-right is assembled AFTER `run tpm` (below) — the
# @catppuccin_status_* module vars don't exist until the plugin loads,
# so building it here left battery empty until a manual source-file.
set -g @catppuccin_date_time_text " %H:%M"
set -g @catppuccin_status_background "#262b33"
set -g @catppuccin_window_left_separator ""
set -g @catppuccin_window_right_separator " "
set -g @catppuccin_window_middle_separator " █"
set -g @catppuccin_window_number_position "right"
set -g @catppuccin_window_default_fill "number"
set -g @catppuccin_window_text " #W"
set -g @catppuccin_window_current_fill "number"
set -g @catppuccin_window_current_text " #W#{?window_zoomed_flag,(),}"
set -g @catppuccin_status_modules_right "directory date_time"
set -g @catppuccin_status_modules_left "session"
set -g @catppuccin_status_left_separator  " "
set -g @catppuccin_status_right_separator " "
set -g @catppuccin_status_right_separator_inverse "no"
set -g @catppuccin_status_fill "icon"
set -g @catppuccin_status_connect_separator "no"
set -g @catppuccin_directory_text "#{b:pane_current_path}"

##--------------------------------------------------------------------------
## Theme palette (follows the active Omarchy theme)
##--------------------------------------------------------------------------
# catppuccin sets its palette with `set -ogq` (only-if-unset), so sourcing the
# Omarchy-generated palette here (before tpm runs) overrides it. The file is
# regenerated on every `omarchy theme set` from the theme's colors.toml; the
# theme-set hook also re-sources it into running tmux servers for live updates.
source-file -q ~/.config/omarchy/current/theme/tmux.conf

# macOS theme switcher palette (generated by macos/theme). Quiet + absent on
# Linux, so this is a no-op there; on mac it overrides the catppuccin defaults.
source-file -q ~/.config/tmux/theme.conf

# Module colors reference the theme palette (@thm_*), so they track Omarchy too.
# Session segment turns @thm_peach while the prefix is held, @thm_mauve otherwise.
set -g @catppuccin_session_color   "#{?client_prefix,#{E:@thm_peach},#{E:@thm_mauve}}"
set -g @catppuccin_directory_color "#{E:@thm_blue}"
set -g @catppuccin_date_time_color "#{E:@thm_mauve}"
set -g @catppuccin_battery_color   "#{E:@thm_teal}"

# Active window -> bright gold (default is @thm_mauve)
set -g @catppuccin_window_current_number_color "#{E:@thm_flamingo}"

##--------------------------------------------------------------------------
## Status line assembly + plugin load order
##--------------------------------------------------------------------------
# Load catppuccin NOW so its @catppuccin_status_* module vars exist, then bake
# status-right (with the literal #{battery_*} placeholders) BEFORE tpm loads
# tmux-battery — that plugin substitutes those placeholders at load time, so
# they must already be present. Building status-right after tpm left battery
# empty until a manual source-file.
run '~/.config/tmux/plugins/tmux/catppuccin.tmux'

set -g  status-right "#{E:@catppuccin_status_session}"
set -agF status-right "#{E:@catppuccin_status_battery}"
set -agF status-right "#{E:@catppuccin_status_date_time}"

run '~/.config/tmux/plugins/tpm/tpm'

##--------------------------------------------------------------------------
## Window pills (override catppuccin's rounded style)
##--------------------------------------------------------------------------
# Catppuccin's "rounded" window style draws pill caps with a reverse trick tied
# to the status background, which breaks on a transparent bar. These redraw the
# caps in the pill color on bg=default (the same approach the right-side modules
# use), so pills render cleanly on a transparent bar. Colors follow @thm_* so
# they track the active theme.
set -gw window-status-separator " "
set -gw window-status-current-format "#[fg=#{E:@thm_surface_1},bg=default]#[fg=#{E:@thm_fg},bg=#{E:@thm_surface_1}] #W#{?window_zoomed_flag,(),} #[fg=#{E:@thm_crust},bg=#{E:@thm_flamingo}] #I#[fg=#{E:@thm_flamingo},bg=default]"
set -gw window-status-format "#[fg=#{E:@thm_surface_0},bg=default]#[fg=#{E:@thm_fg},bg=#{E:@thm_surface_0}] #W #[fg=#{E:@thm_crust},bg=#{E:@thm_overlay_2}] #I#[fg=#{E:@thm_overlay_2},bg=default]"
