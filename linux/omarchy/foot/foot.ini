[main]
# Colors follow the active Omarchy theme; behavior/look below is from dotfiles.
include=~/.config/omarchy/current/theme/foot.ini
term=xterm-256color
font=JetBrainsMono Nerd Font:size=11
pad=14x14
initial-window-mode=windowed
workers=0

[scrollback]
lines=10000

[cursor]
style=block
blink=no

[key-bindings]
clipboard-copy=Control+Insert
primary-paste=none
clipboard-paste=Shift+Insert

# Subtle background transparency (theme colors still come from the include above).
# alpha lives in the per-mode sections now ([colors] is deprecated).
[colors-dark]
alpha=0.85

[colors-light]
alpha=0.85
